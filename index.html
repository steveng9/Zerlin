<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Zerlin</title>
  <link rel="stylesheet" type="text/css" href="style.css">

  <script type="text/javascript" src="./js/Constants.js"></script>
  <script type="text/javascript" src="./js/GameEngine.js"></script>
  <script type="text/javascript" src="./js/Camera.js"></script>
  <script type="text/javascript" src="./js/Level.js"></script>
  <script type="text/javascript" src="./js/Lightning.js"></script>
  <script type="text/javascript" src="./js/SceneManager.js"></script>
  <script type="text/javascript" src="./js/Spark.js"></script>
  <script type="text/javascript" src="./js/CollisionManager.js"></script>
  <script type="text/javascript" src="./js/HeroEntities.js"></script>
  <script type="text/javascript" src="./js/Animation.js"></script>

  <script type="text/javascript" src="./js/DroidUtil.js"></script>
  <script type="text/javascript" src="./js/DroidBasic.js"></script>
  <script type="text/javascript" src="./js/DroidBoss.js"></script>
  <script type="text/javascript" src="./js/StatusBar.js"></script>
  <script type="text/javascript" src="./js/PowerUp.js"></script>
  <script type="text/javascript" src="./js/CheckPoint.js"></script>


  <script type="text/javascript" src="./js/howler.js"></script>
  <script type="text/javascript" src="./js/SoundEngine.js"></script>
  <script type="text/javascript" src="./js/Boss.js"></script>

  <!-- Multiplayer -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <script type="text/javascript" src="./js/NetworkManager.js"></script>

  <script type="text/javascript" src="./js/Main.js"></script>
</head>

<body>

  <div class="grid-container">
    <div class="login-form">
      <div class="form" id="formOverlay">
        <!-- canvas overlay div -->
        <h2>Login or Register</h2>
        <form class="login-form">
          <input type="text" placeholder="username" required="required" />
          <input type="password" placeholder="password" required="required" />
          <button id="loginButton">Get slashing</button>
        </form>
      </div>
      <!-- width = height * PHI -->
      <canvas id="gameWorld" tabindex="1" width="1133" height="700" style="border: 1px solid black; background: black"></canvas>

      <!-- Multiplayer lobby overlay -->
      <div id="lobbyOverlay" style="display:none;">
        <div id="lobbyBox">
          <div id="lobbyTitle">CO-OP MULTIPLAYER</div>

          <!-- Main choice -->
          <div id="lobbyChoicePanel">
            <button class="lobby-btn" id="hostBtn">HOST GAME</button>
            <button class="lobby-btn" id="joinBtn">JOIN GAME</button>
            <button class="lobby-btn lobby-btn-cancel" id="lobbyCancelBtn">CANCEL</button>
          </div>

          <!-- Host waiting panel -->
          <div id="lobbyHostPanel" style="display:none;">
            <div class="lobby-label">Share this code with your partner:</div>
            <div id="roomCodeDisplay">------</div>
            <button class="lobby-btn lobby-btn-copy" id="copyCodeBtn">COPY CODE</button>
            <div id="hostStatus" class="lobby-status">Waiting for partner to connect...</div>
            <button class="lobby-btn lobby-btn-cancel" id="hostCancelBtn">CANCEL</button>
          </div>

          <!-- Join panel -->
          <div id="lobbyJoinPanel" style="display:none;">
            <div class="lobby-label">Enter room code:</div>
            <input type="text" id="roomCodeInput" maxlength="6" placeholder="XXXXXX" autocomplete="off" spellcheck="false">
            <button class="lobby-btn" id="connectBtn">CONNECT</button>
            <div id="joinStatus" class="lobby-status">&nbsp;</div>
            <button class="lobby-btn lobby-btn-cancel" id="joinCancelBtn">CANCEL</button>
          </div>
        </div>
      </div>

      <!-- cheat buttons -->
      <div class="cheat_buttons">
        <input type="button" id="infiniteHealth" value="Infinite Health: ON" style="background:#cc3300; color:#ffffff;">
        <input type="button" id="trainingGroundButton" value="Training Ground">
        <input type="button" id="multiplayerButton" value="Multiplayer">
        <input type="button" id="campaignButton" value="Campaign">
        <div id="trainingControls" style="display:none; margin-top:10px; text-align:right;">
          <div class="training-knob">
            <label>Laser Speed: <span id="laserSpeedVal">1.0&times;</span></label><br>
            <input type="range" id="laserSpeedSlider" min="0.3" max="3.0" step="0.1" value="1">
          </div>
          <div class="training-knob" style="margin-top:6px;">
            <label>Active Droids: <span id="droidCountVal">5</span></label><br>
            <input type="range" id="droidCountSlider" min="1" max="20" step="1" value="5">
          </div>
          <div class="training-knob" style="margin-top:6px;">
            <label>Saber Color: <span id="saberHueVal">Blue</span></label><br>
            <input type="range" id="saberHueSlider" min="0" max="360" step="1" value="120">
          </div>
          <div class="training-knob" style="margin-top:6px;">
            <label>Lightning Color: <span id="lightningHueVal">Blue</span></label><br>
            <input type="range" id="lightningHueSlider" min="0" max="360" step="1" value="240">
          </div>
          <div class="training-knob" style="margin-top:8px;">
            <label>Droid Types:</label><br>
            <label class="bg-radio"><input type="checkbox" name="droidType" value="BasicDroid" checked> Basic</label>
            <label class="bg-radio"><input type="checkbox" name="droidType" value="ScatterShotDroid" checked> Scatter</label>
            <label class="bg-radio"><input type="checkbox" name="droidType" value="SlowBurstDroid" checked> Slow Burst</label>
            <label class="bg-radio"><input type="checkbox" name="droidType" value="FastBurstDroid" checked> Fast Burst</label>
            <label class="bg-radio"><input type="checkbox" name="droidType" value="SniperDroid" checked> Sniper</label>
            <label class="bg-radio"><input type="checkbox" name="droidType" value="MultishotDroid" checked> Multishot</label>
          </div>
          <div class="training-knob" style="margin-top:8px;">
            <label>Background:</label><br>
            <label class="bg-radio"><input type="radio" name="trainingBg" value="0" checked> Dagobah</label>
            <label class="bg-radio"><input type="radio" name="trainingBg" value="1"> Coruscant</label>
            <label class="bg-radio"><input type="radio" name="trainingBg" value="2"> Hoth</label>
          </div>
        </div>
      </div>

    </div>

  </div>

</body>

</html>
